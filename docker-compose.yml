services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: plantain-postgres
    platform: linux/amd64
    environment:
      POSTGRES_DB: plantain
      POSTGRES_USER: plantain
      POSTGRES_PASSWORD: plantain
    ports:
      - "${PLANTAIN_POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: plantain-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${PLANTAIN_REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
